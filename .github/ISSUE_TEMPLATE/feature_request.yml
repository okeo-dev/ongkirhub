name: Feature request
description: Suggest an improvement for OngkirHub
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope alignment
      options:
        - label: This fits the current roadmap phase
        - label: This is explicitly out of current v0.1 scope but valuable later
