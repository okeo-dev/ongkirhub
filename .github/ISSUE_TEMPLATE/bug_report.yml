name: Bug report
description: Report a problem with OngkirHub
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
